<!DOCTYPE html>
<html>
<head>
    <title>Test Resume Analyzer</title>
</head>
<body>
    <h2>Resume Analyzer Test</h2>

    <form action="http://127.0.0.1:5000/analyze" method="POST" enctype="multipart/form-data">
        <label>Upload Resume (PDF):</label><br><br>
        <input type="file" name="resume" required><br><br>

        <label>Paste Job Description:</label><br><br>
        <textarea name="job_description" rows="8" cols="60" required></textarea><br><br>

        <button type="submit">Analyze</button>
    </form>
</body>
</html>
